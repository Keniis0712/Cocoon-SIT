services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: cocoon
      POSTGRES_USER: cocoon
      POSTGRES_PASSWORD: cocoon
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ..
      dockerfile: deploy/backend.Dockerfile
      target: backend-base
    env_file:
      - .env.example
    working_dir: /app
    command:
      [
        "sh",
        "-lc",
        "uv sync --frozen || uv sync; until uv run alembic upgrade head; do echo 'Waiting for database migrations...'; sleep 2; done; exec uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/app --reload-dir /app/alembic --reload-include '*.py'",
      ]
    volumes:
      - ../backend:/app
      - api_dev_venv:/app/.venv
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: ..
      dockerfile: deploy/backend.Dockerfile
      target: backend-base
    env_file:
      - .env.example
    working_dir: /app
    command: ["sh", "-lc", "uv sync --frozen || uv sync; exec uv run python -m app.worker.main"]
    volumes:
      - ../backend:/app
      - worker_dev_venv:/app/.venv
    depends_on:
      api:
        condition: service_started
      postgres:
        condition: service_started
      redis:
        condition: service_started

  frontend:
    build:
      context: ..
      dockerfile: deploy/frontend.Dockerfile
    working_dir: /workspace/frontend
    environment:
      VITE_BACKEND_TARGET: http://api:8000
      CHOKIDAR_USEPOLLING: "true"
    command:
      [
        "sh",
        "-lc",
        "pnpm install --filter @cocoon-sit/frontend... --config.confirmModulesPurge=false && pnpm dev --host 0.0.0.0 --port 5173",
      ]
    volumes:
      - ..:/workspace
      - frontend_workspace_node_modules:/workspace/node_modules
      - frontend_app_node_modules:/workspace/frontend/node_modules
      - ts_sdk_node_modules:/workspace/packages/ts-sdk/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  postgres_dev_data:
  api_dev_venv:
  worker_dev_venv:
  frontend_workspace_node_modules:
  frontend_app_node_modules:
  ts_sdk_node_modules:
