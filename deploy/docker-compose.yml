services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: cocoon
      POSTGRES_USER: cocoon
      POSTGRES_PASSWORD: cocoon
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ..
      dockerfile: deploy/backend.Dockerfile
      target: api-runtime
    env_file:
      - .env
    command:
      [
        "sh",
        "-lc",
        "until uv run alembic upgrade head; do echo 'Waiting for database migrations...'; sleep 2; done; exec uv run uvicorn app.main:app --host 0.0.0.0 --port 8000",
      ]
    ports:
      - "8388:8000"
    volumes:
      - artifact_data:/app/.artifacts
      - plugin_root_data:/app/.plugins
      - plugin_runtime_data:/app/data/plugins
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: ..
      dockerfile: deploy/backend.Dockerfile
      target: worker-runtime
    env_file:
      - .env
    command: ["uv", "run", "python", "-m", "app.worker.main"]
    volumes:
      - artifact_data:/app/.artifacts
      - plugin_root_data:/app/.plugins
      - plugin_runtime_data:/app/data/plugins
    depends_on:
      api:
        condition: service_started
      postgres:
        condition: service_started
      redis:
        condition: service_started

  minio:
    profiles: ["object-storage"]
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"

volumes:
  postgres_data:
  artifact_data:
  plugin_root_data:
  plugin_runtime_data:
